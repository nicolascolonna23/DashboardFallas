<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fallas Diemar · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0B1220;
    --bg-soft:    #111A2E;
    --card:       #17233D;
    --card-hover: #1C2A49;
    --border:     #253351;
    --text:       #E6EAF2;
    --muted:      #8B94A8;
    --primary:    #E85A26;
    --primary-dark: #C84A1C;
    --danger:     #F87171;
    --danger-bg:  rgba(248,113,113,0.12);
    --success:    #34D399;
    --success-bg: rgba(52,211,153,0.12);
    --info:       #60A5FA;
    --info-bg:    rgba(96,165,250,0.12);
    --shadow:     0 4px 14px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.2);
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); margin: 0; }
  body {
    font-family: 'Inter', sans-serif;
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #0B1220 0%, #1A2742 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand img { height: 48px; width: auto; object-fit: contain; }
  .brand-text h1 { margin: 0; font-size: 18px; font-weight: 700; }
  .brand-text .subtitle { font-size: 12px; color: var(--muted); }
  
  .btn { cursor: pointer; border: none; border-radius: 8px; padding: 9px 16px; font-weight: 600; transition: all 0.15s; font-family: inherit; }
  .btn-ghost { background: rgba(255,255,255,.06); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: rgba(255,255,255,.1); }
  .btn-success { background: var(--success); color: #0B1220; }
  .btn-danger { background: var(--danger); color: #0B1220; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 28px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .stat { background: var(--card); border-radius: 12px; padding: 18px 20px; border: 1px solid var(--border); border-left: 3px solid var(--info); }
  .stat.pendiente { border-left-color: var(--danger); }
  .stat.realizado { border-left-color: var(--success); }
  
  .controls { display: flex; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
  .search { flex: 1; min-width: 250px; padding: 11px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); }
  .tabs { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .tab { padding: 11px 16px; cursor: pointer; color: var(--muted); background: transparent; border: none; font-weight: 500; font-family: inherit; }
  .tab.active { background: var(--primary); color: #fff; }

  .patente-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
  .patente-header { padding: 16px 22px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: var(--bg-soft); user-select: none; }
  .patente-header:hover { background: var(--card-hover); }
  .patente-title { font-size: 18px; font-weight: 700; color: var(--primary); }
  .chevron { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
  .patente-card.collapsed .chevron { transform: rotate(-90deg); }
  .patente-card.collapsed .falla-list { display: none; }

  .falla { padding: 16px 22px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center; }
  .falla:last-child { border-bottom: none; }
  .falla-desc { font-size: 13px; color: #C7CEDB; white-space: pre-wrap; margin-top: 6px; }
  
  .badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 12px; }
  .badge-pendiente { background: var(--danger-bg); color: var(--danger); }
  .badge-realizado { background: var(--success-bg); color: var(--success); }

  .loading { text-align: center; padding: 50px; color: var(--muted); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(232,90,38,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1A2742; color: #fff; padding: 12px 24px; border-radius: 8px; box-shadow: var(--shadow); transition: transform 0.3s; z-index: 1000; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <img src="logo_diemar4.png" alt="Diemar" onerror="this.style.display='none'" />
      <div class="brand-text">
        <h1>Dashboard de Fallas</h1>
        <div class="subtitle" id="lastUpdate">Sincronizando...</div>
      </div>
    </div>
    <button class="btn btn-ghost" onclick="cargarDatos()">🔄 Actualizar</button>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">-</div></div>
      <div class="stat pendiente"><div class="stat-label">Pendientes</div><div class="stat-value" id="stat-pendientes">-</div></div>
      <div class="stat realizado"><div class="stat-label">Realizadas</div><div class="stat-value" id="stat-realizadas">-</div></div>
    </div>

    <div class="controls">
      <input class="search" id="search" placeholder="🔍 Buscar patente o chofer..." oninput="renderizar()" />
      <div class="tabs">
        <button class="tab active" data-filtro="pendiente" onclick="setFiltro('pendiente')">Pendientes</button>
        <button class="tab" data-filtro="realizado" onclick="setFiltro('realizado')">Realizadas</button>
        <button class="tab" data-filtro="todas" onclick="setFiltro('todas')">Todas</button>
      </div>
    </div>
    <div id="contenido"></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbzXWNUxusVyC8uWfRLKhUpMCIhfRlBnZcy4QxHp-Uvsp_U69lRjel6698ltBFeimUU/exec';
  const API_KEY = 'diemar-fallas-2026';
  let DATOS = [];
  let FILTRO = 'pendiente';

  async function cargarDatos() {
    const cont = document.getElementById('contenido');
    cont.innerHTML = '<div class="loading"><div class="spinner"></div><p>Cargando datos...</p></div>';
    try {
      const r = await fetch(API_URL);
      const json = await r.json();
      DATOS = json.data || [];
      document.getElementById('lastUpdate').textContent = 'Actualizado: ' + new Date().toLocaleTimeString();
      actualizarStats();
      renderizar();
    } catch (e) {
      cont.innerHTML = '<div class="loading">❌ Error al conectar con la API</div>';
    }
  }

  function actualizarStats() {
    const pend = DATOS.filter(f => /pend/i.test(f.Estado || f.ESTADO)).length;
    const real = DATOS.filter(f => /realiz/i.test(f.Estado || f.ESTADO)).length;
    document.getElementById('stat-total').textContent = DATOS.length;
    document.getElementById('stat-pendientes').textContent = pend;
    document.getElementById('stat-realizadas').textContent = real;
  }

  function setFiltro(f) {
    FILTRO = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.filtro === f));
    renderizar();
  }

  function formatFecha(fechaRaw) {
    if (!fechaRaw) return '';
    const d = new Date(fechaRaw);
    return isNaN(d.getTime()) ? fechaRaw : d.toLocaleDateString('es-AR');
  }

  async function cambiarEstado(marcaTemporal, nuevoEstado, btn) {
    btn.disabled = true;
    btn.textContent = '⏳...';
    try {
      const r = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'setEstado', apiKey: API_KEY, marcaTemporal, estado: nuevoEstado })
      });
      const res = await r.json();
      if (res.ok) {
        showToast('✅ Actualizado');
        const item = DATOS.find(d => d['Marca temporal'] === marcaTemporal);
        if (item) {
          if ('Estado' in item) item.Estado = nuevoEstado;
          if ('ESTADO' in item) item.ESTADO = nuevoEstado;
        }
        actualizarStats();
        renderizar();
      }
    } catch (e) {
      showToast('❌ Error');
      btn.disabled = false;
      btn.textContent = nuevoEstado === 'Realizado' ? '✅' : '↩️';
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function toggleCard(id) {
    document.getElementById(id).classList.toggle('collapsed');
  }

  function renderizar() {
    const cont = document.getElementById('contenido');
    const busqueda = document.getElementById('search').value.toLowerCase();
    
    let filtrados = DATOS.filter(f => {
      const estado = (f.Estado || f.ESTADO || '').toLowerCase();
      if (FILTRO === 'pendiente' && !estado.includes('pend')) return false;
      if (FILTRO === 'realizado' && !estado.includes('realiz')) return false;
      return (f.Patente || f.PATENTE || '').toLowerCase().includes(busqueda) || 
             (f.Chofer || f['NOMBRE Y APELLIDO'] || '').toLowerCase().includes(busqueda);
    });

    if (filtrados.length === 0) {
      cont.innerHTML = '<div class="loading">No hay fallas para mostrar</div>';
      return;
    }

    const grupos = {};
    filtrados.forEach(f => {
      const p = f.Patente || f.PATENTE || 'S/P';
      if (!grupos[p]) grupos[p] = [];
      grupos[p].push(f);
    });

    cont.innerHTML = Object.keys(grupos).map((p, idx) => {
      const idCard = `card-${idx}`;
      return `
      <div class="patente-card" id="${idCard}">
        <div class="patente-header" onclick="toggleCard('${idCard}')">
          <span class="patente-title">${p} <small style="color:var(--muted); font-size:12px">(${grupos[p].length})</small></span>
          <span class="chevron">▼</span>
        </div>
        <div class="falla-list">
          ${grupos[p].map(f => {
            const esPend = /pend/i.test(f.Estado || f.ESTADO);
            const ts = f['Marca temporal'];
            const fechaLimpia = formatFecha(f.Fecha || f.FECHA || ts);
            return `
            <div class="falla">
              <div>
                <div style="font-weight:600">${f.Chofer || f['NOMBRE Y APELLIDO'] || 'Chofer'} - <span style="color:var(--muted)">${fechaLimpia}</span></div>
                <div class="falla-desc">${f.Fallas || f.FALLAS || ''}</div>
              </div>
              <div>
                <button class="btn ${esPend ? 'btn-success' : 'btn-danger'} btn-sm" 
                        onclick="cambiarEstado('${ts}', '${esPend ? 'Realizado' : 'Pendiente'}', this)">
                  ${esPend ? '✅' : '↩️'}
                </button>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');
  }

  window.onload = cargarDatos;
</script>
</body>
</html>
